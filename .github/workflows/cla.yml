name: CLA Assistant

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  CLA:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.CLA_PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: "signatures/version1/cla.json"
          path-to-document: "https://github.com/OTGStudio/forgeide-plugin-sdk/blob/main/CLA.md"
          branch: "main"
          allowlist: OTGStudio-bot,dependabot[bot]
          create-file-commit-message: "chore: add CLA signatures file"
          signed-commit-message: "chore: signed CLA for $contributorName"
          unsigned-comment: |
            Thank you for your pull request!

            Before we can merge it, please sign our [Contributor License Agreement](CLA.md)
            by adding a comment on this PR with the text:

            `I have read and agree to the OTG Studio Contributor License Agreement.`

            This is a one-time requirement across all OTG Studio open source repos.
          signed-comment: |
            CLA signed. Thank you, @{0}!
